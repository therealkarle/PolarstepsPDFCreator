language = "de"
pdf_language = "de"
polarsteps_data_folder = "BSPData"
output_folder = "TripPdfs"
output_folder_pdf = "TripPdfs"
output_folder_html = "TripPdfs"
renderer_mode = "both"
show_rendered_trips = true
open_pdf_after_render = true
auto_update = false
step_title_font_size = 18
step_text_font_size = 12
text_font_path = "C:/Windows/Fonts/SegoeUI.ttf"
emoji_font_path = "C:/Windows/Fonts/seguiemj.ttf"
emoji_scale = 1.2
safety_margin_mm = 12
max_photos_per_step = 6
video_links_location = "appendix"
appendix_show_undisplayed_media = true
photo_wall_columns = 3
photo_masonry_span_2_threshold = 2.0
photo_wall_gap = 2
map_style = "hybrid"
hybrid_labels_opacity = 1.0
marker_thumb_size = 80

[maps.overview]
vertical_resolution_px = 720
aspect_ratio = "16:9"
padding_factor = 0.02
algorithm = "bbox"
min_width_km = 25.0

[maps.step]
vertical_resolution_px = 360
aspect_ratio = "32:9"
padding_factor = 0.05
min_width_km = 12.0
max_distance_farthest_steps_km = 400.0
cluster_distance_km = 2.0
render_scale = 1.0
